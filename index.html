<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E A S Y 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header Image -->
  <img src="e3header.png" class="header-img" alt="EASY3 Header">

  <!-- Main Photo -->
  <img src="easy3photo.jpg" class="photo-img" alt="EASY3 Photo">

  <!-- Two-Column Section -->
  <div class="content-section">
    
    <!-- Left Column: Upcoming Gigs -->
    <div class="left-column">
      <h2 class="section-label">Upcoming Gigs!</h2>
      <div class="gigs-timeline">
        <div class="gig-item">
          <div class="gig-date">Sun 29 Mar</div>
          <div class="gig-details">Wildes Bar Leamington - 3pm</div>
        </div>
        <div class="gig-item">
          <div class="gig-date">Sat 25 Apr</div>
          <div class="gig-details">Southbound Leamington - 8pm</div>
        </div>
        <div class="gig-item">
          <div class="gig-date">Sat 2 May</div>
          <div class="gig-details">Cheltenham Jazz Festival, Brewery Quarter Stage - 5pm</div>
        </div>
        <div class="gig-item">
          <div class="gig-date">Sun 24 May</div>
          <div class="gig-details">Wildes Bar Leamington - 3pm</div>
        </div>
        <div class="gig-item">
          <div class="gig-date">Sun 14 Jun</div>
          <div class="gig-details">Temperance Leamington - 2pm</div>
        </div>
      </div>
    </div>

    <!-- Right Column: Widgets -->
    <div class="right-column">

      <!-- Instagram Widget -->
      <h3 class="section-label">Instagram</h3>
      <div class="widget instagram-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://www.instagram.com/easy3jazz/embed" 
            frameborder="0" 
            scrolling="no" 
            allowtransparency="true">
          </iframe>
        </div>
      </div>

      <!-- Facebook Widget -->
      <h3 class="section-label">Facebook</h3>
      <div class="widget facebook-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Feasy3music&tabs=timeline&width=340&height=500&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=true&appId" 
            width="100%" 
            height="500" 
            style="border:none;overflow:hidden" 
            scrolling="no" 
            frameborder="0" 
            allowfullscreen="true" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture; web-share">
          </iframe>
        </div>
      </div>

      <!-- Spotify Widget -->
      <h3 class="section-label">Spotify</h3>
      <div class="widget spotify-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://open.spotify.com/embed/artist/3spb6QuZH1WEDUc6hO6ICO?utm_source=generator&theme=0" 
            style="border-radius:12px" 
            frameborder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
          </iframe>
        </div>
      </div>

      <!-- YouTube Widget -->
      <h3 class="section-label">YouTube</h3>
      <div class="widget youtube-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://www.youtube.com/embed/jDuuYPHIUm8" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </div>

    </div>

  </div>

</body>
</html>

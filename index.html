<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E A S Y 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Facebook SDK -->
  <div id="fb-root"></div>
  <script async defer crossorigin="anonymous" 
          src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v17.0">
  </script>

  <!-- Header Image -->
  <img src="e3header.png" class="header-img" alt="EASY3 Header">

  <!-- Main Photo -->
  <img src="easy3photo.jpg" class="photo-img" alt="EASY3 Photo">

  <!-- Two-Column Section -->
  <div class="content-section">

    <!-- Left Column: Text and Links -->
    <div class="left-column">
      <h2>About EASY3</h2>
      <p>Welcome to our music page! Check out our latest songs and videos.</p>
      <ul>
        <li><a href="https://www.youtube.com/" target="_blank">YouTube</a></li>
        <li><a href="https://www.spotify.com/" target="_blank">Spotify</a></li>
        <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
      </ul>
    </div>

    <!-- Right Column: Facebook Widget -->
    <div class="right-column">
      <div class="fb-page" 
           data-href="https://www.facebook.com/easy3music" 
           data-show-posts="true"
           data-width="500"
           data-height="700"
           data-small-header="false" 
           data-adapt-container-width="true"
           data-hide-cover="false" 
           data-show-facepile="true">
      </div>
    </div>

  </div>

</body>
</html>

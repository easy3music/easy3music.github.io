<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E A S Y 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Facebook SDK -->
  <div id="fb-root"></div>
  <script async defer crossorigin="anonymous" 
          src="https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v17.0">
  </script>

  <!-- Header Image -->
  <img src="e3header.png" class="header-img" alt="EASY3 Header">

  <!-- Main Photo -->
  <img src="easy3photo.jpg" class="photo-img" alt="EASY3 Photo">

  <!-- Facebook Embed -->
  <div class="fb-container">
    <div class="fb-page" 
         data-href="https://www.facebook.com/easy3music" 
         data-show-posts="true"
         data-width="800"
         data-height="700"
         data-small-header="false" 
         data-adapt-container-width="true"
         data-hide-cover="false" 
         data-show-facepile="true">
    </div>
  </div>

</body>
</html>

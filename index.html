<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E A S Y 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header Image -->
  <img src="e3header.png" class="header-img" alt="EASY3 Header">

  <!-- Main Photo -->
  <img src="easy3photo.jpg" class="photo-img" alt="EASY3 Photo">

  <!-- Two-Column Section -->
  <div class="content-section">

    <!-- Left Column: Widgets -->
    <div class="left-column">

      <!-- Spotify Follow Button -->
      <div class="widget spotify-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://open.spotify.com/embed/artist/3spb6QuZH1WEDUc6hO6ICO?utm_source=generator&theme=0" 
            style="border-radius:12px" 
            frameborder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
          </iframe>
        </div>
      </div>

      <!-- Instagram Embed -->
      <div class="widget instagram-widget">
        <div class="responsive-iframe">
          <iframe 
            src="https://www.instagram.com/p/DUk1YvIAlZu/embed" 
            frameborder="0" 
            scrolling="no" 
            allowtransparency="true">
          </iframe>
        </div>
      </div>

    </div>

    <!-- Right Column: Links -->
    <div class="right-column">
      <h2>More Links</h2>
      <p>Explore more content and stay connected with us:</p>
      <ul>
        <li><a href="https://open.spotify.com/artist/3spb6QuZH1WEDUc6hO6ICO?si=HjI8nBIMRwG98wE5SxdFhA" target="_blank">Spotify</a></li>
        <li><a href="https://www.instagram.com/easy3jazz/" target="_blank">Instagram</a></li>
      </ul>
    </div>

  </div>

</body>
</html>
